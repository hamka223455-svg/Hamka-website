<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceman Demo - Main Sampai x100!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b69 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            align-items: start;
        }

        .game-area {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .multiplier {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .multiplier.crash {
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-2deg); }
            75% { transform: translate(-50%, -50%) rotate(2deg); }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 60px 0 30px 0;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #000;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff4444, #ff6666);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 68, 68, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #ffd700;
        }

        .balance {
            text-align: center;
            font-size: 2em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .bet-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #ffd700;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
        }

        .bet-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .quick-bets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .quick-btn {
            padding: 10px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 8px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: #ffd700;
            color: #000;
        }

        .history {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .jackpot {
            text-align: center;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            padding: 20px;
            border-radius: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status {
            text-align: center;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
        }

        .status.waiting { color: #4ade80; }
        .status.flying { color: #ffd700; }
        .status.crashed { color: #ff4444; }

        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .multiplier {
                font-size: 4em;
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 3s linear infinite;
        }

        @keyframes particle-float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 SPACEMAN HAMKA🚀</h1>
            <p>Main di website Hamka!!!</p>
        </div>

        <div class="game-container">
            <div class="game-area">
                <div class="particles" id="particles"></div>
                <div class="multiplier" id="multiplier">1.00x</div>
                
                <div class="status" id="status">Klik BET untuk mulai!</div>
                
                <div class="controls">
                    <button class="btn btn-primary" id="betBtn">BET</button>
                    <button class="btn btn-danger" id="cashoutBtn" disabled>CASHOUT</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="balance" id="balance">Saldo: Rp 1.000.000</div>
                    
                    <input type="number" class="bet-input" id="betAmount" placeholder="Masukkan taruhan" min="1000" max="100000">
                    
                    <div class="quick-bets">
                        <button class="quick-btn" onclick="setBet(5000)">5K</button>
                        <button class="quick-btn" onclick="setBet(10000)">10K</button>
                        <button class="quick-btn" onclick="setBet(25000)">25K</button>
                        <button class="quick-btn" onclick="setBet(50000)">50K</button>
                        <button class="quick-btn" onclick="setBet(100000)">100K</button>
                        <button class="quick-btn" onclick="setBet(0)">MAX</button>
                    </div>

                    <div class="jackpot">
                        <div>🎁 GAMPANG JACKPOT</div>
                        <div style="font-size: 1.5em; margin-top: 5px;">x100 = Rp 10.000.000!</div>
                    </div>
                </div>

                <div class="panel">
                    <h3 style="margin-bottom: 15px;">📊 HISTORY</h3>
                    <div class="history" id="history"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class SpacemanGame {
            constructor() {
                this.balance = 5000;
                this.currentBet = 0;
                this.multiplier = 1.00;
                this.gameState = 'waiting';
                this.gameSpeed = 0.01; // LAMBAT BANGET! (dari 0.08)
                this.isAutoCashout = false;
                this.history = [];
                this.gameInterval = null;

                this.init();
            }

            init() {
                this.bindEvents();
                this.updateBalance();
                this.updateStatus('Klik BET untuk mulai!');
                this.addParticle();
            }

            bindEvents() {
                document.getElementById('betBtn').addEventListener('click', () => this.placeBet());
                document.getElementById('cashoutBtn').addEventListener('click', () => this.cashout());
                document.getElementById('betAmount').addEventListener('input', (e) => {
                    this.currentBet = parseInt(e.target.value) || 0;
                });
            }

            placeBet() {
                const betAmount = this.currentBet || parseInt(document.getElementById('betAmount').value) || 10000;
                
                if (betAmount > this.balance) {
                    alert('Saldo tidak cukup!');
                    return;
                }

                this.balance -= betAmount;
                this.currentBet = betAmount;
                this.multiplier = 1.00;
                this.gameState = 'betting';
                
                this.updateBalance();
                this.updateMultiplier();
                this.startGame();
            }

            startGame() {
                this.gameState = 'flying';
                this.gameSpeed = 0.01; // Reset ke LAMBAT
                document.getElementById('betBtn').disabled = true;
                document.getElementById('cashoutBtn').disabled = false;
                
                this.updateStatus('🚀 Terbang! CASHOUT kapan saja!');
                
                this.gameInterval = setInterval(() => {
                    this.multiplier += this.gameSpeed;
                    this.gameSpeed += 0.0002; // SUPER LAMBAT akselerasi
                    
                    this.updateMultiplier();
                    
                    // Crash CHANCE MASIH SANGAT KECIL
                    if (Math.random() < 0.001 + (this.multiplier * 0.0003)) {
                        this.crash();
                    }
                    
                    // Jackpot lebih mudah
                    if (this.multiplier > 30 && Math.random() < 0.008) {
                        this.jackpot();
                    }
                }, 100); // INTERVAL 2X LEBIH LAMBAT (dari 50ms ke 100ms)
            }

            cashout() {
                if (this.gameState !== 'flying') return;
                
                const winnings = Math.floor(this.currentBet * this.multiplier);
                this.balance += winnings;
                
                this.addToHistory(this.multiplier.toFixed(2) + 'x', `+Rp ${winnings.toLocaleString()}`);
                
                this.endGame();
                this.updateBalance();
            }

            crash() {
                document.getElementById('multiplier').classList.add('crash');
                this.gameState = 'crashed';
                
                this.addToHistory(this.multiplier.toFixed(2) + 'x', 'CRASH');
                this.endGame();
            }

            jackpot() {
                const jackpotMultiplier = 100;
                const jackpotWin = Math.floor(this.currentBet * jackpotMultiplier);
                this.balance += jackpotWin;
                
                alert(`🎉 JACKPOT! x${jackpotMultiplier} = Rp ${jackpotWin.toLocaleString()}`);
                this.addToHistory('100x', `JACKPOT +Rp ${jackpotWin.toLocaleString()}`);
                
                this.endGame();
                this.updateBalance();
            }

            endGame() {
                clearInterval(this.gameInterval);
                document.getElementById('betBtn').disabled = false;
                document.getElementById('cashoutBtn').disabled = true;
                document.getElementById('multiplier').classList.remove('crash');
                
                setTimeout(() => {
                    this.gameState = 'waiting';
                    this.updateStatus('Game selesai! BET lagi?');
                    this.multiplier = 1.00;
                    this.gameSpeed = 0.01;
                    this.currentBet = 0;
                    document.getElementById('betAmount').value = '';
                    this.updateMultiplier();
                }, 3000);
            }

            updateMultiplier() {
                document.getElementById('multiplier').textContent = this.multiplier.toFixed(2) + 'x';
            }

            updateBalance() {
                document.getElementById('balance').textContent = `Saldo: Rp ${this.balance.toLocaleString()}`;
            }

            updateStatus(message) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = message;
                statusEl.className = 'status ' + (this.gameState === 'flying' ? 'flying' : 
                                    this.gameState === 'crashed' ? 'crashed' : 'waiting');
            }

            addToHistory(multiplier, result) {
                this.history.unshift({ multiplier, result, time: new Date().toLocaleTimeString() });
                if (this.history.length > 10) this.history.pop();
                this.renderHistory();
            }

            renderHistory() {
                const historyEl = document.getElementById('history');
                historyEl.innerHTML = this.history.map(item => 
                    `<div class="history-item">
                        <span>${item.multiplier}</span>
                        <span>${item.result}</span>
                    </div>`
                ).join('');
            }

            addParticle() {
                if (Math.random() < 0.3) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 3 + 's';
                    particle.style.animationDuration = (2 + Math.random() * 3) + 's';
                    document.getElementById('particles').appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 6000);
                }
            }
        }

        // Global functions for quick bet buttons
        function setBet(amount) {
            const game = window.game;
            if (amount === 0) {
                amount = Math.floor(game.balance * 0.1);
            }
            document.getElementById('betAmount').value = amount;
            game.currentBet = amount;
        }

        // Initialize game
        window.game = new SpacemanGame();

        // Add particles periodically
        setInterval(() => window.game.addParticle(), 2000);
    </script>
</body>
  </html>
